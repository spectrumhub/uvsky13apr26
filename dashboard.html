<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>
</head>

<body style="background:black;color:white;font-family:Arial;text-align:center">

<h2>Dispatch Dashboard</h2>

<button onclick="testClick()">Test Button</button>
<button onclick="createLoad()">Create Load</button>

<div id="output"></div>

<script>
function testClick(){
  document.getElementById("output").innerHTML = "Button Works ✅";
}
</script>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = " https://ahkrqnuqwrxdyiyxsovs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI";

let supabaseClient;

try {
  supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch (e) {
  document.getElementById("output").innerHTML = "Supabase failed to load";
}

async function createLoad(){
  const id = "SH-" + Date.now();

  document.getElementById("output").innerHTML = "Creating load...";

  const { error } = await supabaseClient
    .from("loads")
    .insert([
      {
        load_id: id,
        pickup: "Atlanta",
        delivery: "Charlotte",
        status: "NEW"
      }
    ]);

  if(error){
    document.getElementById("output").innerHTML = "Error: " + error.message;
    return;
  }

  document.getElementById("output").innerHTML = "Load Created: " + id;
}
</script>

</body>
</html>
