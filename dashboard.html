<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="background:black;color:white;font-family:Arial">

<h2>Dispatch Dashboard</h2>

<button onclick="createLoad()">Create Load</button>

<div id="output"></div>

<script>
const supabase = supabase.createClient(
  "PASTE_SUPABASE_URL",
  "PASTE_SUPABASE_KEY"
);

async function createLoad(){
  const id = "SH-" + Date.now();

  await supabase.from("loads").insert([
    {
      load_id: id,
      pickup: "Atlanta",
      delivery: "Charlotte",
      status: "NEW"
    }
  ]);

  await supabase.from("events").insert([
    { load_id: id, type: "LOAD_CREATED" }
  ]);

  output.innerHTML = "Load Created: " + id;
}
</script>

</body>
</html>
